spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: smartcampus_app
    password:  ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
          implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
  redis:
    host: 127.0.0.1
    port: 6379
    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  web:
    resources:
      static-locations: file:./uploads/, classpath:/static/
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB      # 单个文件最大大小
      max-request-size: 50MB   # 整个请求最大大小
      file-size-threshold: 2KB

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET}
  
 # 百度云内容审核配置
baidu:
  cloud:
    appid: ${BAIDU_APPID:}
    apikey: ${BAIDU_APIKEY:}
    secretkey: ${BAIDU_SECRETKEY:}

# 异步线程池配置
async:
  pool:
    core-size: 5
    max-size: 10
    queue-capacity: 500
    keep-alive-seconds: 60
    thread-name-prefix: audit-task-

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG